<!DOCTYPE html><html>
<head>
  <title>Mini Free Fire Full</title>
  <style>
    body { text-align:center; font-family:Arial; background:#111; color:#fff; }
    input, button { padding:10px; margin:5px; }
    canvas { background:#222; display:none; margin:auto; }
  </style>
</head>
<body><h2>🔐 Đăng nhập / Đăng ký</h2><div id="auth">
  <input id="user" placeholder="Username"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="register()">Đăng ký</button>
  <button onclick="login()">Đăng nhập</button>
</div><div id="menu" style="display:none;">
  <h2>🎮 Xin chào <span id="name"></span></h2>
  <button onclick="startGame()">Chơi</button>
</div><h3 id="scoreText" style="display:none;">Điểm: 0</h3><canvas id="game" width="400" height="600"></canvas>

<script>
// ===== AUTH =====
function register(){
  let u = user.value;
  let p = pass.value;
  if(!u || !p) return alert("Nhập đủ đi!");
  localStorage.setItem("acc_"+u, p);
  alert("Đăng ký OK!");
}

function login(){
  let u = user.value;
  let p = pass.value;
  if(localStorage.getItem("acc_"+u) === p){
    auth.style.display="none";
    menu.style.display="block";
    name.innerText = u;
  } else {
    alert("Sai tài khoản!");
  }
}

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, bullets, enemies, score;

function startGame(){
  menu.style.display="none";
  canvas.style.display="block";
  scoreText.style.display="block";

  // reset
  player = {x:Math.random()*380, y:Math.random()*580, size:20};
  bullets = [];
  enemies = [];
  score = 0;

  spawnLoop();
  update();
}

// movement
document.addEventListener("keydown", e => {
  if(!player) return;

  if (e.key === "ArrowLeft") player.x -= 10;
  if (e.key === "ArrowRight") player.x += 10;
  if (e.key === "ArrowUp") player.y -= 10;
  if (e.key === "ArrowDown") player.y += 10;

  // shoot
  if (e.key === " ") {
    bullets.push({x:player.x+8, y:player.y});
  }
});

// spawn enemy
function spawnLoop(){
  setInterval(()=>{
    enemies.push({
      x:Math.random()*380,
      y:0,
      size:20
    });
  }, 1000);
}

function update(){
  ctx.clearRect(0,0,400,600);

  // player
  ctx.fillStyle="lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // bullets
  ctx.fillStyle="yellow";
  bullets.forEach((b,i)=>{
    b.y -= 6;
    ctx.fillRect(b.x, b.y, 5,10);

    if(b.y < 0) bullets.splice(i,1);
  });

  // enemies
  ctx.fillStyle="red";
  enemies.forEach((e,i)=>{
    e.y += 2;
    ctx.fillRect(e.x, e.y, e.size, e.size);

    // collision
    bullets.forEach((b,bi)=>{
      if(b.x < e.x+e.size && b.x+5 > e.x &&
         b.y < e.y+e.size && b.y+10 > e.y){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        score++;
      }
    });

    // game over
    if(player &&
       player.x < e.x+e.size &&
       player.x+player.size > e.x &&
       player.y < e.y+e.size &&
       player.y+player.size > e.y){
         alert("💀 Game Over! Điểm: "+score);
         location.reload();
    }
  });

  scoreText.innerText = "Điểm: " + score;

  requestAnimationFrame(update);
}
</script></body>
</html>
