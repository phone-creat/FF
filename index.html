<!DOCTYPE html><html>
<head>
  <title>Mini Free Fire Mobile</title>
  <style>
    body { text-align:center; font-family:Arial; background:#111; color:#fff; }
    input, button { padding:10px; margin:5px; }
    canvas { background:#222; display:none; margin:auto; }/* controls */
#controls {
  display:none;
  position:fixed;
  bottom:20px;
  width:100%;
}

.btn {
  width:60px;
  height:60px;
  background:#444;
  color:#fff;
  border:none;
  border-radius:50%;
  font-size:20px;
  margin:5px;
}

#shootBtn {
  position:fixed;
  right:20px;
  bottom:40px;
  background:red;
}

  </style>
</head>
<body><h2>🔐 Login</h2><div id="auth">
  <input id="user" placeholder="Username"><br>
  <input id="pass" placeholder="Password" type="password"><br>
  <button onclick="register()">Đăng ký</button>
  <button onclick="login()">Đăng nhập</button>
</div><div id="menu" style="display:none;">
  <h2>🎮 Xin chào <span id="name"></span></h2>
  <button onclick="startGame()">Chơi</button>
</div><h3 id="scoreText" style="display:none;">Điểm: 0</h3><canvas id="game" width="400" height="600"></canvas>

<!-- controls --><div id="controls">
  <div>
    <button class="btn" ontouchstart="move('up')" ontouchend="stop()">⬆</button>
  </div>
  <div>
    <button class="btn" ontouchstart="move('left')" ontouchend="stop()">⬅</button>
    <button class="btn" ontouchstart="move('down')" ontouchend="stop()">⬇</button>
    <button class="btn" ontouchstart="move('right')" ontouchend="stop()">➡</button>
  </div>
</div><button id="shootBtn" class="btn"
ontouchstart="shoot()">🔫</button>

<script>
// ===== AUTH =====
function register(){
  let u = user.value;
  let p = pass.value;
  if(!u || !p) return alert("Nhập đủ!");
  localStorage.setItem("acc_"+u, p);
  alert("OK!");
}

function login(){
  let u = user.value;
  let p = pass.value;
  if(localStorage.getItem("acc_"+u) === p){
    auth.style.display="none";
    menu.style.display="block";
    name.innerText = u;
  } else alert("Sai!");
}

// ===== GAME =====
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player, bullets, enemies, score;
let direction = null;

function startGame(){
  menu.style.display="none";
  canvas.style.display="block";
  controls.style.display="block";
  shootBtn.style.display="block";
  scoreText.style.display="block";

  player = {x:Math.random()*380, y:Math.random()*580, size:20};
  bullets = [];
  enemies = [];
  score = 0;

  setInterval(()=>{
    enemies.push({x:Math.random()*380, y:0, size:20});
  },1000);

  update();
}

// movement touch
function move(dir){
  direction = dir;
}

function stop(){
  direction = null;
}

// shoot
function shoot(){
  bullets.push({x:player.x+8, y:player.y});
}

// update
function update(){
  ctx.clearRect(0,0,400,600);

  // move
  if(direction==="left") player.x -= 3;
  if(direction==="right") player.x += 3;
  if(direction==="up") player.y -= 3;
  if(direction==="down") player.y += 3;

  // player
  ctx.fillStyle="lime";
  ctx.fillRect(player.x, player.y, player.size, player.size);

  // bullets
  ctx.fillStyle="yellow";
  bullets.forEach((b,i)=>{
    b.y -= 6;
    ctx.fillRect(b.x, b.y, 5,10);
    if(b.y<0) bullets.splice(i,1);
  });

  // enemies
  ctx.fillStyle="red";
  enemies.forEach((e,i)=>{
    e.y += 2;
    ctx.fillRect(e.x, e.y, e.size, e.size);

    bullets.forEach((b,bi)=>{
      if(b.x < e.x+e.size && b.x+5 > e.x &&
         b.y < e.y+e.size && b.y+10 > e.y){
        enemies.splice(i,1);
        bullets.splice(bi,1);
        score++;
      }
    });

    if(player &&
       player.x < e.x+e.size &&
       player.x+player.size > e.x &&
       player.y < e.y+e.size &&
       player.y+player.size > e.y){
         alert("💀 Game Over! Điểm: "+score);
         location.reload();
    }
  });

  scoreText.innerText = "Điểm: " + score;

  requestAnimationFrame(update);
}
</script></body>
</html>
